name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: Lint + Typecheck + Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Lint (ESLint + Prettier)
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Tests
        run: pnpm test

  aislamiento:
    name: Aislamiento multi-tenant (RLS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Levantar Postgres de Supabase con migraciones
        run: |
          pnpm exec supabase db start
          pnpm exec supabase migration up

      - name: Suite de aislamiento (gate innegociable)
        run: pnpm --filter @nom35/pruebas-rls test:rls

  e2e:
    name: E2E flujo del empleado
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Levantar Supabase local (aplica migraciones)
        run: pnpm exec supabase start

      - name: Exportar credenciales locales de Supabase
        run: |
          pnpm exec supabase status -o env > sb.env
          set -a; source sb.env; set +a
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY"
            echo "SUPABASE_DB_URL=$DB_URL"
          } >> "$GITHUB_ENV"

      - name: Gate de textos oficiales (sin placeholders, coincidencia exacta)
        run: node scripts/verificar-textos-items.mjs

      - name: Build de la app
        run: pnpm --filter @nom35/web build

      - name: Instalar navegador de Playwright
        run: pnpm --filter @nom35/web exec playwright install --with-deps chromium

      - name: E2E (Playwright)
        run: pnpm --filter @nom35/web test:e2e

      - name: Subir evidencia de fallos E2E
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-resultados
          path: apps/web/test-results/
          retention-days: 7
